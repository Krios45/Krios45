<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.3  0 0 0 0 0.5  0 0 0 0 1  0 0 0 0.8 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>

  <g>
    <path id="wave1" d="M0 220 Q 300 260 600 220 T 1200 220 V300 H0Z" fill="url(#wave1)">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M0 220 Q 300 260 600 220 T 1200 220 V300 H0Z;
                M0 230 Q 300 200 600 230 T 1200 230 V300 H0Z;
                M0 220 Q 300 260 600 220 T 1200 220 V300 H0Z"/>
      <animate attributeName="fill-opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path id="wave2" d="M0 240 Q 300 280 600 240 T 1200 240 V300 H0Z" fill="url(#wave2)" opacity="0.7">
      <animate attributeName="d" dur="8s" repeatCount="indefinite"
        values="M0 240 Q 300 280 600 240 T 1200 240 V300 H0Z;
                M0 250 Q 300 220 600 250 T 1200 250 V300 H0Z;
                M0 240 Q 300 280 600 240 T 1200 240 V300 H0Z"/>
      <animate attributeName="fill-opacity" values="0.7;0.2;0.7" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="'Comic Sans MS', 'Comic Sans', 'Marker Felt', 'Trebuchet MS', sans-serif" text-anchor="middle" filter="url(#text-glow)">
    <text x="600" y="130" font-size="44" font-weight="700" fill="#1976d2">みなさん、こんにちわ! キイン です</text>
  </g>
</svg>
